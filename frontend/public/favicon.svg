      <stop offset="0%" stop-color="#46bf77" />
      <stop offset="100%" stop-color="#177b5a" />
    </linearGradient>
  </defs>
  <!-- Squircle Background -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" />
  
  <!-- Play button + Fork Cutout -->
