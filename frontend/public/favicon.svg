<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#46bf77" />
      <stop offset="100%" stop-color="#177b5a" />
    </linearGradient>
  </defs>
  <!-- Squircle Background -->
  <rect x="16" y="16" width="992" height="992" rx="250" fill="url(#bgGrad)" />
  
  <!-- Play button + Fork Cutout Mask -->
  <mask id="playMask">
    <!-- Everything white remains -->
    <rect width="1024" height="1024" fill="white" />
    <!-- Fork cutout shape (drawn in black) -->
    <path d="M 470 410 
             C 470 375, 488 375, 488 410 
             L 488 490 
             Q 495.5 505, 503 490 
             L 503 410 
             C 503 375, 521 375, 521 410 
             L 521 490 
             Q 528.5 505, 536 490 
             L 536 410 
             C 536 375, 554 375, 554 410 
             L 554 530 
             C 554 565, 524 555, 524 590 
             L 524 750 
             L 500 750 
             L 500 590 
             C 500 555, 470 565, 470 530 
             Z" fill="black" />
  </mask>
  
  <!-- Play Button Triangle (masked by playMask to create the cutout) -->
  <path d="M 250 240 
           L 250 784 
           Q 250 834, 293.4 809.1 
           L 766.6 536.9 
           Q 810 512, 766.6 487.1 
           L 293.4 214.9 
           Q 250 190, 250 240 
           Z" fill="white" mask="url(#playMask)" />
</svg>
