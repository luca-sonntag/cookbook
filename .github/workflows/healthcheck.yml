name: Periodic Health Check

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Standalone Health Check
        env:
          # Database & credentials for the check
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_SOCIAL_HOST: ${{ secrets.RAPIDAPI_SOCIAL_HOST }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          # URLs to monitor
          HEALTHCHECK_BACKEND_URL: ${{ secrets.HEALTHCHECK_BACKEND_URL }}
          HEALTHCHECK_WEBSITE_URL: ${{ secrets.HEALTHCHECK_WEBSITE_URL }}
          # Alerting credentials
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run healthcheck
